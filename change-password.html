<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Byt lösenord | Lokomotiv</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body class="login-page">
  <main class="login-card">
    <a href="index.html" class="back-link">← Till hemsidan</a>

    <h1>Byt lösenord</h1>
    <p class="login-subtitle">
      Du behöver välja ett eget lösenord innan du fortsätter.
    </p>

    <form id="changePasswordForm" class="login-form">
      <label for="oldPassword">Nuvarande lösenord</label>
      <input
        id="oldPassword"
        type="password"
        autocomplete="current-password"
        required
      />

      <label for="newPassword">Nytt lösenord</label>
      <input
        id="newPassword"
        type="password"
        autocomplete="new-password"
        minlength="8"
        required
      />

      <button type="submit">Spara lösenord</button>

      <p id="message" class="form-message"></p>
    </form>
  </main>

  <script src="change-password.js"></script>
</body>
</html>
