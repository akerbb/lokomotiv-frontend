<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Login | Lokomotiv</title>
  <link rel="stylesheet" href="personal.css" />
</head>
<body>
  <main class="login-card">
    <p class="login-brand">Lokomotiv</p>
    <h1>Personal</h1>
    <p class="login-text">Logga in för att komma åt personalportalen.</p>

    <form id="loginForm" class="login-form">
      <label>
        Användarnamn
        <input id="username" name="username" type="text" autocomplete="username" required />
      </label>

      <label>
        Lösenord
        <input id="password" name="password" type="password" autocomplete="current-password" required />
      </label>

      <button id="loginBtn" type="submit">Logga in</button>
      <p id="message" class="message" aria-live="polite"></p>
    </form>

    <a class="back-link" href="index.html">Till hemsidan</a>
  </main>

  <script src="personal.js"></script>
</body>
</html>
